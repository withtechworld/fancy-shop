<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Luxe &amp; Active — The Hanging Edit</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Inter:wght@300;400;500&display=swap');

  :root{
    --scroll:0;
    --ink:#0a0a0c;
    --ink-2:#111116;
    --bone:#f4f2ee;
    --muted:#8b8b93;
    --gold:#e8c877;      /* luxe */
    --teal:#12e6b8;      /* performance */
    --signal:#ff2d6b;    /* fancy / live */
    --rail:#3a3a42;
  }

  *{box-sizing:border-box;margin:0;padding:0}

  html{scroll-behavior:auto}

  body{
    background:
      radial-gradient(120% 80% at 78% 0%, rgba(232,200,119,.06), transparent 60%),
      radial-gradient(90% 70% at 15% 100%, rgba(18,230,184,.05), transparent 55%),
      var(--ink);
    color:var(--bone);
    font-family:'Inter',sans-serif;
    height:560vh;            /* scroll runway for the assembly */
    overflow-x:hidden;
  }

  /* fine grain / vignette so the black doesn't read flat */
  body::after{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:60;
    box-shadow:inset 0 0 220px 40px rgba(0,0,0,.65);
  }

  .stage{
    position:sticky;top:0;height:100vh;width:100vw;overflow:hidden;
  }

  /* ---- kinetic background word ---- */
  .ghost{
    position:absolute;top:50%;left:50%;
    font-family:'Syncopate',sans-serif;font-weight:700;
    font-size:clamp(5rem,20vw,20rem);letter-spacing:-.02em;
    color:transparent;-webkit-text-stroke:1px rgba(232,200,119,.10);
    white-space:nowrap;z-index:0;user-select:none;
    transform:translate(-50%,-50%) translateX(calc((var(--scroll) - .5) * 26vw));
  }

  /* ================= LEFT : the pitch ================= */
  .pitch{
    position:absolute;left:clamp(28px,6vw,110px);top:50%;
    transform:translateY(-50%);
    width:min(46vw,560px);z-index:5;
  }
  .eyebrow{
    font-family:'Syncopate',sans-serif;font-size:.66rem;font-weight:700;
    letter-spacing:.42em;color:var(--gold);text-transform:uppercase;
    display:flex;align-items:center;gap:14px;margin-bottom:26px;
    opacity:clamp(0,calc(var(--scroll) * 8),1);
    transform:translateX(calc((1 - clamp(0,calc(var(--scroll)*8),1)) * -20px));
  }
  .eyebrow::before{content:"";width:34px;height:1px;background:var(--gold);display:block}

  .headline{
    font-family:'Fraunces',serif;font-weight:400;
    font-size:clamp(2.6rem,5.4vw,5rem);line-height:.98;letter-spacing:-.01em;
    margin-bottom:26px;min-height:2.6em;
  }
  .headline em{font-style:italic;color:var(--gold)}
  .headline .swap{display:inline-block;transition:opacity .35s ease, transform .35s ease}
  .headline.morph .swap{opacity:0;transform:translateY(8px)}

  .sub{
    font-size:1.02rem;line-height:1.65;color:var(--muted);
    max-width:40ch;font-weight:300;margin-bottom:34px;
    opacity:clamp(0,calc((var(--scroll) - .04) * 8),1);
  }
  .sub strong{color:var(--bone);font-weight:500}

  .pick{
    display:flex;align-items:center;gap:12px;
    font-family:'Syncopate',sans-serif;font-size:.62rem;font-weight:700;
    letter-spacing:.34em;text-transform:uppercase;color:var(--teal);
    opacity:clamp(0,calc((var(--scroll) - .55) * 4),1);
  }
  .pick .dot{width:7px;height:7px;border-radius:50%;background:var(--teal);
    box-shadow:0 0 12px var(--teal);animation:pulse 1.8s infinite}
  @keyframes pulse{50%{opacity:.35;transform:scale(.7)}}

  /* the shop button that appears once a rail is chosen */
  .shop-cta{
    margin-top:30px;display:inline-flex;align-items:center;gap:14px;
    padding:15px 30px;border-radius:40px;border:1px solid transparent;
    background:linear-gradient(90deg,var(--gold),#f4dd9e);
    color:#141008;font-family:'Syncopate',sans-serif;font-weight:700;
    font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;
    cursor:pointer;opacity:0;transform:translateY(14px);pointer-events:none;
    transition:opacity .4s ease,transform .4s ease,box-shadow .3s ease;
  }
  .shop-cta.show{opacity:1;transform:translateY(0);pointer-events:auto;
    box-shadow:0 14px 40px rgba(232,200,119,.28)}
  .shop-cta:hover{box-shadow:0 14px 50px rgba(232,200,119,.5)}
  .shop-cta .arw{transition:transform .25s ease}
  .shop-cta:hover .arw{transform:translateX(5px)}

  /* ================= RIGHT : the rail ================= */
  .rail-panel{
    position:absolute;right:0;top:0;height:100vh;
    width:min(50vw,640px);z-index:4;
  }
  /* the horizontal rod the tags hang from */
  .rod{
    position:absolute;top:12%;left:8%;right:14%;height:6px;border-radius:6px;
    background:linear-gradient(180deg,#5a5a63,#26262c);
    box-shadow:0 3px 10px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.25);
  }
  .rod::before,.rod::after{ /* the mounts */
    content:"";position:absolute;top:-4px;width:14px;height:14px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#6b6b73,#1c1c22);
    box-shadow:0 2px 6px rgba(0,0,0,.6);
  }
  .rod::before{left:-7px}
  .rod::after{right:-7px}

  /* each hanging tag */
  .tag{
    position:absolute;width:150px;height:196px;
    transform-origin:50% -0px;           /* swing from the hook hole */
    will-change:transform;cursor:pointer;
    transform:translate(0,0);opacity:0;  /* JS reveals as it flies in */
  }
  /* the string from rod to tag */
  .tag .string{
    position:absolute;left:50%;bottom:100%;width:1px;
    height:var(--len,60px);background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.28));
    transform:translateX(-.5px);
  }
  .tag .hole{
    position:absolute;top:9px;left:50%;transform:translateX(-50%);
    width:14px;height:14px;border-radius:50%;
    background:var(--ink);border:2px solid rgba(255,255,255,.35);
    box-shadow:inset 0 1px 2px rgba(0,0,0,.8);z-index:2;
  }
  .tag .card{
    position:absolute;inset:0;border-radius:14px;padding:16px 14px 14px;
    background:linear-gradient(160deg,rgba(255,255,255,.055),rgba(255,255,255,.015));
    backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,.10);
    box-shadow:0 18px 40px rgba(0,0,0,.55);
    display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
    overflow:hidden;transition:border-color .3s ease,box-shadow .3s ease,transform .3s ease;
  }
  .tag .card::before{ /* accent hairline top */
    content:"";position:absolute;top:26px;left:14px;right:14px;height:1px;
    background:var(--acc,var(--gold));opacity:.6;
  }
  /* product image well — SWAP THE EMOJI FOR <img> LATER */
  .well{
    position:relative;flex:1;width:100%;display:flex;align-items:center;justify-content:center;
    margin-top:14px;
  }
  .well::after{
    content:"";position:absolute;inset:14% 18%;border-radius:50%;
    background:radial-gradient(circle,var(--acc,var(--gold)),transparent 70%);
    opacity:.16;filter:blur(6px);
  }
  .well .ph{font-size:3.4rem;position:relative;filter:drop-shadow(0 6px 14px rgba(0,0,0,.5))}
  .meta{width:100%;text-align:center;padding-top:6px}
  .meta .name{
    font-family:'Syncopate',sans-serif;font-weight:700;font-size:.64rem;
    letter-spacing:.18em;text-transform:uppercase;
  }
  .meta .idx{
    font-family:'Inter',sans-serif;font-size:.58rem;color:var(--muted);
    letter-spacing:.24em;margin-top:5px;text-transform:uppercase;
  }
  /* hover + selected states */
  .tag:hover .card{border-color:var(--acc,var(--gold));
    box-shadow:0 22px 55px rgba(0,0,0,.6),0 0 26px -6px var(--acc,var(--gold))}
  .tag.selected .card{
    border-color:var(--acc,var(--gold));
    box-shadow:0 22px 60px rgba(0,0,0,.6),0 0 0 1px var(--acc,var(--gold)),0 0 34px -4px var(--acc,var(--gold));
  }
  .tag.selected .card::after{
    content:"✓ ON THE LIST";position:absolute;top:9px;left:0;right:0;text-align:center;
    font-family:'Syncopate',sans-serif;font-size:.42rem;letter-spacing:.16em;color:var(--acc,var(--gold));
  }

  /* ================= scroll hint ================= */
  .scroll-hint{
    position:absolute;left:50%;bottom:28px;transform:translateX(-50%);z-index:6;
    font-family:'Syncopate',sans-serif;font-size:.6rem;letter-spacing:.34em;
    text-transform:uppercase;color:var(--muted);
    display:flex;flex-direction:column;align-items:center;gap:10px;
    opacity:clamp(0,calc(1 - var(--scroll) * 6),1);
  }
  .scroll-hint .line{width:1px;height:34px;background:linear-gradient(180deg,var(--muted),transparent);
    animation:drop 1.9s infinite}
  @keyframes drop{0%{transform:scaleY(.3);transform-origin:top;opacity:.3}
    50%{transform:scaleY(1);opacity:1}100%{transform:scaleY(.3);transform-origin:bottom;opacity:.3}}

  /* progress ticks bottom-right */
  .ticks{
    position:absolute;right:26px;bottom:26px;z-index:6;display:flex;gap:7px;
  }
  .ticks i{width:22px;height:2px;border-radius:2px;background:rgba(255,255,255,.15);transition:background .3s}
  .ticks i.on{background:var(--gold)}

  /* ================= mobile ================= */
  @media (max-width:860px){
    body{height:auto;overflow-x:hidden}
    .stage{position:relative;height:auto;min-height:100vh;padding:88px 20px 40px}
    .ghost{display:none}
    .pitch{position:relative;left:0;top:0;transform:none;width:100%;margin-bottom:40px}
    .headline{min-height:auto;font-size:clamp(2.2rem,9vw,3.2rem)}
    .eyebrow,.sub,.pick{opacity:1 !important;transform:none !important}
    .rail-panel{position:relative;width:100%;height:auto}
    .rod{position:relative;top:0;left:0;right:0;margin:0 6px 34px}
    .rail-panel .tag-wrap{display:flex;gap:16px;overflow-x:auto;padding:0 4px 16px;scroll-snap-type:x mandatory}
    .tag{position:relative !important;left:auto !important;top:auto !important;transform:none !important;opacity:1 !important;flex:0 0 auto;scroll-snap-align:center;margin-top:var(--len,50px)}
    .scroll-hint,.ticks{display:none}
  }

  @media (prefers-reduced-motion:reduce){
    .headline .swap{transition:none}
  }
</style>
</head>
<body>

  <div class="stage">
    <div class="ghost">ELEVATE</div>

    <!-- LEFT: the pitch -->
    <div class="pitch">
      <div class="eyebrow">Luxe &amp; Active — The Hanging Edit</div>
      <h1 class="headline" id="headline">
        <span class="swap">Everything you want,<br><em>on one rail.</em></span>
      </h1>
      <p class="sub">
        Six curated rails where <strong>performance meets the finer things.</strong>
        Scroll to load the rack — then pick the one that's yours.
      </p>
      <div class="pick"><span class="dot"></span><span>Choose a rail to begin</span></div>
      <button class="shop-cta" id="shopCta">
        <span id="shopLabel">Shop</span><span class="arw">→</span>
      </button>
    </div>

    <!-- RIGHT: the rail -->
    <div class="rail-panel">
      <div class="rod"></div>
      <div class="tag-wrap" id="tagWrap"></div>
    </div>

    <div class="scroll-hint"><span>Scroll to hang the collection</span><span class="line"></span></div>
    <div class="ticks" id="ticks"></div>
  </div>

<script>
  /* ---------- the collection ----------
     Each tag = one shoppable category. Swap `ph` (the emoji placeholder)
     for <img src="shoe.png"> etc. when you have real product cutouts. */
  const ITEMS = [
    { key:'footwear', name:'Footwear', ph:'👟', acc:'var(--teal)',
      line:'Footwear that <em>earns</em><br>every mile.',
      hx:14, len:52,  from:{x:-135, y:-30, r:-38} },
    { key:'watches',  name:'Watches',  ph:'⌚', acc:'var(--gold)',
      line:'Time, tailored<br>to your <em>pulse.</em>',
      hx:40, len:150, from:{x:150,  y:-20, r:52}  },
    { key:'gifts',    name:'Gifts',    ph:'🎁', acc:'var(--signal)',
      line:'The gift that<br><em>always fits.</em>',
      hx:66, len:74,  from:{x:60,   y:130, r:24}  },
    { key:'bags',     name:'Bags',     ph:'👜', acc:'var(--gold)',
      line:'Carry it like<br>you <em>mean it.</em>',
      hx:26, len:230, from:{x:-120, y:120, r:-60} },
    { key:'eyewear',  name:'Eyewear',  ph:'🕶️', acc:'var(--teal)',
      line:'See the day in<br><em>sharper</em> light.',
      hx:54, len:300, from:{x:140,  y:110, r:70}  },
    { key:'apparel',  name:'Apparel',  ph:'🧥', acc:'var(--signal)',
      line:'Layers built to<br>move &amp; <em>impress.</em>',
      hx:80, len:196, from:{x:120,  y:-60, r:44}  },
  ];

  const DEFAULT_LINE = 'Everything you want,<br><em>on one rail.</em>';
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  const wrap = document.getElementById('tagWrap');
  const headline = document.getElementById('headline');
  const swap = headline.querySelector('.swap');
  const shopCta = document.getElementById('shopCta');
  const shopLabel = document.getElementById('shopLabel');
  const ticksBox = document.getElementById('ticks');

  let selected = null;

  // build tags + ticks
  ITEMS.forEach((it,i)=>{
    const t = document.createElement('div');
    t.className = 'tag';
    t.style.setProperty('--acc', it.acc);
    t.style.setProperty('--len', it.len+'px');
    t.style.left = `calc(${it.hx}% - 75px)`;
    t.style.top  = `calc(12% + ${it.len}px)`;   // hole sits at rod + string length
    t.dataset.i = i;
    t.innerHTML = `
      <div class="string"></div>
      <div class="card">
        <div class="hole"></div>
        <div class="well"><span class="ph">${it.ph}</span></div>
        <div class="meta">
          <div class="name">${it.name}</div>
          <div class="idx">Rail 0${i+1}</div>
        </div>
      </div>`;
    it.el = t;
    wrap.appendChild(t);

    const tick = document.createElement('i');
    ticksBox.appendChild(tick);
    it.tick = tick;

    // interactions
    t.addEventListener('mouseenter',()=>{ if(!isMobile()) setHeadline(it.line); });
    t.addEventListener('mouseleave',()=>{ if(!isMobile() && !selected) setHeadline(DEFAULT_LINE); });
    t.addEventListener('click',()=> selectItem(i));
  });

  function isMobile(){ return window.innerWidth <= 860; }

  function setHeadline(html){
    if(reduce){ swap.innerHTML = html; return; }
    headline.classList.add('morph');
    setTimeout(()=>{ swap.innerHTML = html; headline.classList.remove('morph'); }, 240);
  }

  function selectItem(i){
    const it = ITEMS[i];
    ITEMS.forEach(x=> x.el.classList.remove('selected'));
    it.el.classList.add('selected');
    selected = i;
    setHeadline(it.line);
    shopLabel.textContent = 'Shop ' + it.name;
    shopCta.style.setProperty('background', `linear-gradient(90deg, ${it.acc}, #f4dd9e)`);
    shopCta.classList.add('show');
  }
  shopCta.addEventListener('click',()=>{
    if(selected!=null){
      const it = ITEMS[selected];
      shopLabel.textContent = 'Opening ' + it.name + '…';
      // hook your real navigation here, e.g. location.href = '/shop/'+it.key;
    }
  });

  /* ---------- easing ---------- */
  function easeOutBack(x){ const c1=1.70158, c3=c1+1; return 1 + c3*Math.pow(x-1,3) + c1*Math.pow(x-1,2); }
  function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }

  /* ---------- scroll → smooth value ---------- */
  let target=0, cur=0;
  window.addEventListener('scroll',()=>{
    const max = document.documentElement.scrollHeight - window.innerHeight;
    target = max>0 ? window.scrollY / max : 0;
  });

  const START=0.06, WIN=0.30, STEP=0.108; // per-tag landing window + stagger

  function frame(t){
    if(isMobile()){                       // static rack on mobile
      document.documentElement.style.setProperty('--scroll', 1);
      requestAnimationFrame(frame);
      return;
    }
    cur += (target - cur) * 0.09;
    document.documentElement.style.setProperty('--scroll', cur);

    ITEMS.forEach((it,i)=>{
      const s = START + i*STEP;
      let p = clamp((cur - s)/WIN, 0, 1);
      const e = reduce ? p : easeOutBack(p);     // overshoot = the landing swing
      const rem = 1 - e;                          // 1 = off-screen, 0 = hung

      // idle sway once it has landed
      let sway = 0;
      if(!reduce && p > 0.9){
        const settle = (p-0.9)/0.1;
        sway = Math.sin(t/900 + i) * 1.4 * settle;
      }
      const isHov = it.el.matches(':hover');
      const hov = isHov ? -7 : 0;

      const x = it.from.x * rem;
      const y = it.from.y * rem;
      const r = it.from.r * rem + sway + hov;
      const op = clamp(p*2.2, 0, 1);

      it.el.style.transform = `translate(${x}vw, ${y}vh) rotate(${r}deg)`;
      it.el.style.opacity = op;
      it.tick.classList.toggle('on', p > 0.5);
    });

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // recalc target on resize so it doesn't get stuck
  window.addEventListener('resize',()=>{
    const max = document.documentElement.scrollHeight - window.innerHeight;
    target = max>0 ? window.scrollY / max : 0;
  });
</script>
</body>
</html>
